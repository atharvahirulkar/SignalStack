version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# signalstack — full local stack
#
# Services:
#   zookeeper       Kafka coordination
#   kafka           Message broker  (port 9092)
#   kafka-ui        Browser UI      (port 8080)
#   timescaledb     Time-series DB  (port 5432)
#   grafana         Dashboards      (port 3000)
#   mlflow          Experiment tracking (port 5001)
#   signalstack-ingest   WebSocket → Kafka producer
#   signalstack-stream   PySpark consumer → TimescaleDB
#
# Usage:
#   docker compose up -d              # start all
#   docker compose up -d kafka timescaledb grafana   # infra only
#   docker compose logs -f signalstack-ingest
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  TIMESCALE_DSN: ${TIMESCALE_DSN}
  POLYGON_API_KEY: ${POLYGON_API_KEY}
  TICKERS: ${TICKERS:-*}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  KAFKA_COMPRESSION: ${KAFKA_COMPRESSION:-lz4}

networks:
  signalstack-net:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  timescale-data:
  grafana-data:
  mlflow-data:

services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: signalstack-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - signalstack-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: signalstack-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # external (host)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: internal (container-to-container) + external (host)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      # Performance
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168        # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 536870912    # 512 MB
      KAFKA_LOG_RETENTION_BYTES: 10737418240 # 10 GB
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_NUM_NETWORK_THREADS: 4
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - signalstack-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: signalstack-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: signalstack
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - signalstack-net

  # ── TimescaleDB ────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: signalstack-timescaledb
    restart: unless-stopped
    ports:
      - "5433:5432"    # host 5433 → container 5432 (avoids conflict with local postgres)
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Tuning for time-series workload
      POSTGRES_MAX_CONNECTIONS: 100
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=2GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - max_wal_size=2GB
      - -c
      - synchronous_commit=off       # async commit: safe for telemetry, faster
      - -c
      - log_min_duration_statement=500
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./storage/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - signalstack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: signalstack-grafana
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/signalstack.json
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboard/grafana/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
      - ./dashboard/grafana/dashboard.yaml:/etc/grafana/provisioning/dashboards/dashboard.yaml:ro
      - ./dashboard/grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    networks:
      - signalstack-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MLflow ─────────────────────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile_inline: |
        FROM ghcr.io/mlflow/mlflow:v2.13.0
        RUN pip install --no-cache-dir psycopg2-binary
    container_name: signalstack-mlflow
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "5001:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: ${TIMESCALE_DSN}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    command: >
      mlflow server
      --backend-store-uri ${TIMESCALE_DSN}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow-data:/mlflow/artifacts
    networks:
      - signalstack-net

  # ── signalstack Ingestion ──────────────────────────────────────────────────
  signalstack-ingest:
    build:
      context: .
      dockerfile: Dockerfile
      target: ingestion
    container_name: signalstack-ingest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      <<: *common-env
    networks:
      - signalstack-net
    profiles:
      - app        # only starts with: docker compose --profile app up

  # ── signalstack Streaming ──────────────────────────────────────────────────
  signalstack-stream:
    build:
      context: .
      dockerfile: Dockerfile
      target: streaming
    container_name: signalstack-stream
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      <<: *common-env
      SPARK_MASTER: local[4]
    networks:
      - signalstack-net
    profiles:
      - app

  # ── signalstack Inference API ──────────────────────────────────────────────
  signalstack-inference:
    build:
      context: .
      dockerfile: Dockerfile
      target: inference
    image: signalstack:latest
    container_name: signalstack-inference
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ARTIFACT_DIR: /app/artifacts
    networks:
      - signalstack-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    profiles:
      - app